# ContentOG Operational Settings

crawler:
  provider: "http" # options: http, firecrawl
  limit_per_domain: 50
  max_depth: 2
  timeout: 30
  retry_attempts: 3
  backoff_seconds: 1.0
  min_success_per_keyword: 1

serp:
  results_per_keyword: 10
  region: "us"
  language: "en"
  timeout: 30
  retry_attempts: 3
  backoff_seconds: 1.0

embeddings:
  model_name: "text-embedding-3-small"
  dimensions: 1536
  timeout: 60
  retry_attempts: 3
  backoff_seconds: 1.0

clustering:
  min_cluster_size: 2
  metric: "cosine"

llm:
  provider: "lm_studio" # options: openai, lm_studio
  model_name: "mistralai/ministral-3-3b"
  base_url: "http://192.168.1.34:1234/v1"
  timeout: 90
  retry_attempts: 3
  backoff_seconds: 1.0

scheduling:
  industry_crawl_interval: "monthly"
  competitor_crawl_interval: "weekly"
  site_crawl_interval: "weekly"
